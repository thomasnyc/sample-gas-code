<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albany NY Gas Prices</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { margin: 0 0 5px 0; color: #343a40; font-size: 24px; }
        .date { color: #6c757d; font-size: 14px; margin-bottom: 25px; }
        .price-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #dee2e6;
        }
        .price-box:last-child { border-bottom: none; }
        .label { font-size: 18px; font-weight: 500; color: #495057; }
        .price { font-size: 22px; font-weight: bold; }
        .high { color: #dc3545; }
        .low { color: #28a745; }
        .avg { color: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Albany, NY Gas Prices</h1>
        <div class="date" id="date-label">Fetching latest data...</div>

        <div class="price-box">
            <span class="label">Highest Price</span>
            <span class="price high" id="high-price">$--</span>
        </div>
        <div class="price-box">
            <span class="label">Lowest Price</span>
            <span class="price low" id="low-price">$--</span>
        </div>
        <div class="price-box">
            <span class="label">Average Price</span>
            <span class="price avg" id="avg-price">$--</span>
        </div>
    </div>

    <script>
        // Fetches the JSON file updated daily by our script
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('date-label').innerText = "Last updated: " + data.date;
                document.getElementById('high-price').innerText = "$" + data.prices.highest.toFixed(2);
                document.getElementById('low-price').innerText = "$" + data.prices.lowest.toFixed(2);
                document.getElementById('avg-price').innerText = "$" + data.prices.average.toFixed(2);
            })
            .catch(error => {
                document.getElementById('date-label').innerText = "Unable to load data.";
                console.error('Error fetching data:', error);
            });
    </script>
</body>
</html>
