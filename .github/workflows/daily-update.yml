name: Update Gas Prices Daily

on:
  schedule:
    - cron: '0 5 * * *' # 5:00 AM UTC is 12:00 AM EST
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        # Install the official Google Generative AI SDK
        run: pip install google-generativeai

      - name: Run Python script
        env:
          # Pass the Gemini Secret to the Python script
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git commit -m "Automated daily gas price update via Gemini" || exit 0
          git push
